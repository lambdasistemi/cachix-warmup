name: Homebrew Pipeline Test

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, bundle, release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v30

      - name: Build hello
        run: nix build nixpkgs#hello -o /tmp/hello-nix

      - name: Bundle
        run: |
          mkdir -p /tmp/bundle/bin /tmp/bundle/lib
          cp /tmp/hello-nix/bin/hello /tmp/bundle/bin/
          otool -L /tmp/bundle/bin/hello \
            | grep -v /usr/lib | grep -v /System | grep -v ":" \
            | awk '{print $1}' | while read lib; do
              libname=$(basename "$lib")
              cp "$lib" /tmp/bundle/lib/
              install_name_tool -change "$lib" "@executable_path/../lib/$libname" /tmp/bundle/bin/hello
            done
          /tmp/bundle/bin/hello

      - name: Create tarball
        run: |
          tar czf /tmp/hello-aarch64-darwin.tar.gz -C /tmp/bundle .
          shasum -a 256 /tmp/hello-aarch64-darwin.tar.gz

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete hello-test-v1 -y 2>/dev/null || true
          gh release create hello-test-v1 \
            --title "Hello World Test" \
            --notes "Test for homebrew pipeline" \
            /tmp/hello-aarch64-darwin.tar.gz

      - name: Generate and push formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          SHA=$(shasum -a 256 /tmp/hello-aarch64-darwin.tar.gz | cut -d' ' -f1)
          URL=https://github.com/lambdasistemi/cachix-warmup/releases/download/hello-test-v1/hello-aarch64-darwin.tar.gz
          printf 'class HelloNix < Formula\n  desc "Hello world built from nixpkgs (test)"\n  homepage "https://github.com/lambdasistemi/cachix-warmup"\n  url "%s"\n  sha256 "%s"\n  version "2.12.3"\n\n  def install\n    bin.install "bin/hello"\n    lib.install Dir["lib/*"]\n  end\nend\n' "$URL" "$SHA" > /tmp/hello-nix.rb
          cat /tmp/hello-nix.rb
          git clone https://x-access-token:${TAP_TOKEN}@github.com/lambdasistemi/homebrew-tap.git /tmp/tap
          mkdir -p /tmp/tap/Formula
          cp /tmp/hello-nix.rb /tmp/tap/Formula/hello-nix.rb
          cd /tmp/tap
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/hello-nix.rb
          git diff --cached --quiet || git commit -m "update hello-nix to hello-test-v1"
          git push

      - name: Test brew install
        run: |
          brew tap lambdasistemi/tap
          brew install hello-nix
          echo "==> Running:"
          hello
