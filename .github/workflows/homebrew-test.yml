name: Homebrew Pipeline Test

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, bundle, release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Build hello
        run: nix build nixpkgs#hello -o /tmp/hello-nix

      - name: Bundle
        run: |
          mkdir -p /tmp/bundle/bin /tmp/bundle/lib
          cp /tmp/hello-nix/bin/hello /tmp/bundle/bin/

          otool -L /tmp/bundle/bin/hello \
            | grep -v /usr/lib | grep -v /System | grep -v ":" \
            | awk '{print $1}' | while read lib; do
              libname=$(basename "$lib")
              echo "bundling: $lib -> lib/$libname"
              cp "$lib" /tmp/bundle/lib/
              install_name_tool -change "$lib" "@executable_path/../lib/$libname" /tmp/bundle/bin/hello
            done

          echo "==> Verify:"
          otool -L /tmp/bundle/bin/hello
          /tmp/bundle/bin/hello

      - name: Create tarball and sha256
        run: |
          cd /tmp
          tar czf hello-aarch64-darwin.tar.gz -C bundle .
          shasum -a 256 hello-aarch64-darwin.tar.gz

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete hello-test-v1 -y 2>/dev/null || true
          gh release create hello-test-v1 \
            --title "Hello World Test" \
            --notes "Test for homebrew pipeline" \
            /tmp/hello-aarch64-darwin.tar.gz

      - name: Print formula
        run: |
          SHA256=$(shasum -a 256 /tmp/hello-aarch64-darwin.tar.gz | cut -d' ' -f1)
          cat << EOF
          === FORMULA FOR homebrew-tap/Formula/hello-nix.rb ===

          class HelloNix < Formula
            desc "Hello world built from nixpkgs (test)"
            homepage "https://github.com/lambdasistemi/cachix-warmup"
            url "https://github.com/lambdasistemi/cachix-warmup/releases/download/hello-test-v1/hello-aarch64-darwin.tar.gz"
            sha256 "$SHA256"

            def install
              bin.install "bin/hello"
              lib.install Dir["lib/*"]
            end
          end
          EOF
